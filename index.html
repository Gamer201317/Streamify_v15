<script>
  async function streamifyFetchMetadata(apiKey,onProgress){
    const lib=await uv();
    if(!lib)return{found:0,notFound:0,total:0,error:null,partial:!1};
    const items=[...lib.movies,...lib.series];
    let found=0,notFound=0,errors=0;
    async function saveProgress(){try{await iv(lib)}catch(e){}}
    for(let i=0;i<items.length;i++){
      const item=items[i];
      onProgress&&onProgress({current:i+1,total:items.length,title:item.title});
      const result=await streamifyFetchOMDb(item.title,apiKey);
      if(result.error){
        errors++;
        if(result.error==='INVALID_KEY'){await saveProgress();return{found,notFound,total:items.length,error:'Ongeldige API-key. Controleer je key op www.omdbapi.com/apikey.aspx',partial:found+notFound>0}}
        if(result.error==='RATE_LIMIT'){await saveProgress();return{found,notFound,total:items.length,error:'Te veel requests voor vandaag. Probeer het morgen opnieuw.',partial:found+notFound>0}}
        if(result.error==='NETWORK'){await saveProgress();return{found,notFound,total:items.length,error:'Netwerkfout. Controleer je internet en probeer het opnieuw.',partial:found+notFound>0}}
        continue;
      }
      if(result.data){
        const d=result.data;
        item.description=d.Plot;
        item.rating=d.imdbRating;
        item.year=d.Year;
        item.genres=d.Genre;
        item.director=d.Director;
        item.cast=d.Actors;
        item.runtime=d.Runtime;
        if(d.PosterDataUrl)item.coverDataUrl=d.PosterDataUrl;
        found++;
      }else{notFound++}
    }
    await saveProgress();
    return{found:found,notFound:notFound,total:items.length,errors:errors,error:null,partial:!1};
  }
  async function streamifyFetchOMDb(title,apiKey){
    try{
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(),15000);
      const res=await fetch('https://www.omdbapi.com/?t='+encodeURIComponent(title)+'&apikey='+apiKey+'&plot=full',{signal:controller.signal});
      clearTimeout(timeout);
      if(!res.ok)return{error:'NETWORK'};
      const data=await res.json();
      if(data.Response==='False'){
        if(data.Error&&data.Error.toLowerCase().includes('invalid key'))return{error:'INVALID_KEY'};
        if(data.Error&&data.Error.toLowerCase().includes('too many'))return{error:'RATE_LIMIT'};
        return{data:null};
      }
      let PosterDataUrl=null;
      if(data.Poster&&data.Poster!=='N/A'){
        try{
          const imgRes=await fetch(data.Poster,{signal:controller.signal});
          if(!imgRes.ok)throw new Error('poster fetch failed');
          const blob=await imgRes.blob();
          PosterDataUrl=await qs(blob);
        }catch(e){}
      }
      return{data:{...data,PosterDataUrl}};
    }catch(e){
      if(e.name==='AbortError')return{error:'NETWORK'};
      return{error:'NETWORK'};
    }
  }
</script>
